<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Машина времени · Time Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1f3b;
    --indigo:#2b2f6b;
    --indigo2:#3b4196;
    --brass:#d9a23b;
    --brass2:#b9842a;
    --cyan:#2f7fb0;
    --good:#2fbf71;      /* зелёный ТОЛЬКО для верных ответов */
    --bad:#e0443d;
    --card:#fffdf7;
    --soft:#f0ece0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#e3d4b0,#c7b083);
    transition:background .9s ease;
    min-height:100%;
  }
  .app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:10px 12px 26px;}

  /* ===== HUD ===== */
  .hud{position:sticky;top:0;z-index:40;background:rgba(255,253,247,.92);backdrop-filter:blur(6px);
    border:2px solid rgba(43,47,107,.15);border-radius:16px;padding:8px 12px;margin-bottom:10px;box-shadow:0 6px 18px rgba(27,31,59,.12);}
  .hud-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .score{font-family:'Unbounded',sans-serif;font-weight:800;font-size:20px;color:var(--indigo);transition:transform .18s ease;}
  .score.bump{transform:scale(1.28);color:var(--good);}
  .stage-tag{font-size:12px;font-weight:700;color:var(--brass2);background:#fbf2dc;border-radius:999px;padding:4px 10px;white-space:nowrap;}
  .charge-wrap{margin-top:8px;}
  .charge-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--indigo);margin-bottom:3px;}
  .charge-track{height:12px;background:#e7e0cf;border-radius:999px;overflow:hidden;border:1px solid rgba(43,47,107,.15);}
  .charge-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--brass),var(--cyan));transition:width .5s ease;}

  /* ===== STAGE AREA ===== */
  .stage{flex:1;background:var(--card);border-radius:20px;padding:18px 16px 22px;box-shadow:0 10px 30px rgba(27,31,59,.16);}
  h1{font-family:'Unbounded',sans-serif;font-size:26px;line-height:1.1;color:var(--indigo);margin-bottom:6px;}
  h2{font-family:'Unbounded',sans-serif;font-size:19px;color:var(--indigo);margin-bottom:4px;}
  .lead{font-size:15px;color:#4a4f73;margin-bottom:14px;}
  .prompt{font-size:15px;color:#4a4f73;margin-bottom:10px;}
  .target{font-family:'Unbounded',sans-serif;font-size:24px;color:var(--ink);text-align:center;margin:6px 0 16px;}
  .hint{display:inline-block;background:#fbf2dc;color:var(--brass2);border-radius:999px;padding:3px 12px;font-weight:700;font-size:16px;}

  .btn{font-family:'Manrope',sans-serif;font-weight:700;font-size:16px;border:none;border-radius:14px;padding:13px 18px;cursor:pointer;
    background:var(--indigo);color:#fff;transition:transform .08s,filter .15s;width:100%;}
  .btn:active{transform:translateY(1px);}
  .btn.brass{background:linear-gradient(180deg,var(--brass),var(--brass2));}
  .btn.ghost{background:#eee9dc;color:var(--indigo);}
  .btn:disabled{opacity:.55;cursor:default;}

  .grid{display:grid;gap:10px;}
  .grid.two{grid-template-columns:1fr 1fr;}
  .opt{font-weight:700;font-size:16px;border:2px solid rgba(43,47,107,.2);border-radius:14px;padding:14px;background:#fff;cursor:pointer;text-align:center;transition:.12s;}
  .opt:hover{border-color:var(--indigo);}
  .opt.good{background:var(--good);border-color:var(--good);color:#fff;}
  .opt.bad{background:var(--bad);border-color:var(--bad);color:#fff;}

  /* memory */
  .mem{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .card{aspect-ratio:1.15;border-radius:14px;border:2px solid rgba(43,47,107,.2);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;text-align:center;font-weight:700;font-size:14px;padding:6px;transition:.12s;}
  .card.flip{background:var(--indigo);color:#fff;border-color:var(--indigo);}
  .card.done{background:var(--good);color:#fff;border-color:var(--good);pointer-events:none;}

  /* input */
  .inp{width:100%;font-size:18px;font-family:'Manrope';padding:13px 14px;border:2px solid rgba(43,47,107,.25);border-radius:14px;text-align:center;margin-bottom:10px;}
  .inp:focus{outline:none;border-color:var(--indigo);}

  /* chips */
  .build{min-height:54px;background:#f6f2e6;border:2px dashed rgba(43,47,107,.25);border-radius:14px;padding:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .chip{font-weight:700;font-size:16px;background:#fff;border:2px solid rgba(43,47,107,.2);border-radius:10px;padding:8px 12px;cursor:pointer;}
  .chip.used{opacity:.35;pointer-events:none;}
  .chip.placed{background:var(--indigo);color:#fff;border-color:var(--indigo);}

  .attempts{font-size:13px;color:#8a7a52;font-weight:700;text-align:center;margin-bottom:8px;}

  /* boss */
  .boss-stage{text-align:center;}
  .hpbar{height:16px;background:#e7e0cf;border-radius:999px;overflow:hidden;border:1px solid rgba(43,47,107,.2);margin:6px auto 14px;max-width:280px;}
  .hpfill{height:100%;background:linear-gradient(90deg,#e0443d,#d9a23b);transition:width .4s ease;}

  /* feedback */
  .toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.8);z-index:120;
    background:var(--good);color:#fff;font-family:'Unbounded';font-weight:800;font-size:22px;
    padding:18px 28px;border-radius:18px;box-shadow:0 16px 44px rgba(0,0,0,.3);opacity:0;transition:.18s;}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  .overlay{position:fixed;inset:0;background:rgba(27,31,59,.5);z-index:130;display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal{max-width:380px;width:100%;background:#fff;border-radius:18px;padding:22px;border-top:7px solid var(--bad);position:relative;box-shadow:0 18px 50px rgba(0,0,0,.3);}
  .modal h3{font-family:'Unbounded';color:var(--bad);font-size:20px;margin-bottom:8px;}
  .modal p{font-size:16px;line-height:1.4;}
  .modal .ans{font-weight:800;color:var(--indigo);}
  .xclose{position:absolute;top:10px;right:12px;width:34px;height:34px;border:none;border-radius:50%;background:#f0ece0;color:var(--ink);font-size:20px;font-weight:800;cursor:pointer;line-height:1;}

  .center{text-align:center;}
  .machine{display:block;margin:6px auto 14px;}
  .stars{font-size:40px;letter-spacing:6px;margin:10px 0;}
  .final-score{font-family:'Unbounded';font-size:30px;color:var(--indigo);}
</style>
</head>
<body>
<div class="app">
  <div class="hud" id="hud" style="display:none;">
    <div class="hud-top">
      <div class="score" id="score">0 ⭐</div>
      <div class="stage-tag" id="stageTag">Этап 1 / 6</div>
    </div>
    <div class="charge-wrap">
      <div class="charge-label"><span>⚙️ Заряд машины времени</span><span id="chargePct">0%</span></div>
      <div class="charge-track"><div class="charge-fill" id="chargeFill"></div></div>
    </div>
  </div>
  <div class="stage" id="stage"></div>
</div>

<script>
/* ================= STATE ================= */
const TOTAL_OPS = 41;
let score = 0, correct = 0, stageNo = 0;

const stageEl   = document.getElementById('stage');
const hudEl     = document.getElementById('hud');
const scoreEl   = document.getElementById('score');
const stageTag  = document.getElementById('stageTag');
const chargeFill= document.getElementById('chargeFill');
const chargePct = document.getElementById('chargePct');

/* фон сепия -> яркое настоящее по заряду */
function hexLerp(a,b,t){
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const c=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));
  return '#'+c.map(v=>v.toString(16).padStart(2,'0')).join('');
}
function setCharge(){
  const t = correct/TOTAL_OPS;
  chargeFill.style.width = (t*100)+'%';
  chargePct.textContent = Math.round(t*100)+'%';
  const top = hexLerp('#e3d4b0','#243b6b',t);
  const bot = hexLerp('#c7b083','#0e6e8c',t);
  document.body.style.background = `linear-gradient(180deg,${top},${bot})`;
}
function renderScore(){
  scoreEl.textContent = score+' ⭐';
  scoreEl.classList.add('bump');
  setTimeout(()=>scoreEl.classList.remove('bump'),200);
}
function award(){ score+=10; correct++; renderScore(); setCharge(); }
function setStageTag(){ stageTag.textContent = 'Этап '+stageNo+' / 6'; }

/* ================= FEEDBACK ================= */
function feedbackCorrect(cb){
  const t=document.createElement('div');
  t.className='toast'; t.textContent='ВЕРНО! +10 ⭐';
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),180); cb&&cb(); }, 1300);
}
/* красное окно с КРЕСТИКОМ — само НЕ исчезает, ученик закрывает и идёт дальше */
function feedbackWrong(answerText, cb){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML =
    '<div class="modal">'+
      '<button class="xclose" aria-label="Закрыть">×</button>'+
      '<h3>Не совсем…</h3>'+
      '<p>Правильный ответ: <span class="ans">'+answerText+'</span></p>'+
    '</div>';
  document.body.appendChild(ov);
  ov.querySelector('.xclose').onclick=()=>{ ov.remove(); cb&&cb(); };
}

/* ================= HELPERS ================= */
function normWord(s){
  return (s||'').toLowerCase().trim().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').replace(/^(an |a |the )/,'');
}
function normSent(s){
  return (s||'').toLowerCase().trim().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ');
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ================= STAGE RUNNER ================= */
const stages = [stageMemory, stageSorting, stageChoice, stageTyped, stageSentence, stageBoss];
function nextStage(){
  if(stageNo>=stages.length){ return finalScreen(); }
  setStageTag();
  stages[stageNo++]();   // stageNo инкрементируется ПОСЛЕ запуска; tag уже верный
}
/* выправляем нумерацию тега: показываем текущий */
function startStage(fn){ fn(); }

/* ---------- INTRO ---------- */
function intro(){
  stageEl.innerHTML =
    '<div class="center">'+
      machineSVG()+
      '<h1>Машина времени</h1>'+
      '<p class="lead">Привет! Сегодня мы отправимся в прошлое и узнаем, <b>кем были</b> разные люди. '+
      'Каждый верный ответ заряжает машину времени. Готовы? 🚀</p>'+
      '<button class="btn brass" id="go">Поехали!</button>'+
    '</div>';
  document.getElementById('go').onclick=()=>{ hudEl.style.display='block'; stageNo=1; runStage(0); };
}
/* запуск конкретного этапа по индексу */
let _idx=0;
function runStage(i){
  _idx=i; stageNo=i+1; setStageTag();
  stages[i]();
}
function stageDone(){
  if(_idx+1>=stages.length) finalScreen();
  else runStage(_idx+1);
}

/* ================= 1. MEMORY ================= */
function stageMemory(){
  const pairs=[
    ['writer','писатель'],['dancer','танцор'],['teacher','учитель'],
    ['librarian','библиотекарь'],['musician','музыкант'],['artist','художник']
  ];
  let deck=[];
  pairs.forEach((p,i)=>{ deck.push({id:i,txt:p[0]}); deck.push({id:i,txt:p[1]}); });
  deck=shuffle(deck);
  let first=null, lock=false, matched=0;

  stageEl.innerHTML='<h2>Этап 1 · Кто есть кто</h2>'+
    '<p class="prompt">Найди пары: профессия по-английски ↔️ по-русски. Нажми на две карточки.</p>'+
    '<div class="mem" id="mem"></div>';
  const grid=document.getElementById('mem');
  deck.forEach((c,idx)=>{
    const el=document.createElement('div');
    el.className='card flip'; el.textContent=c.txt; el.dataset.idx=idx; el.dataset.id=c.id;
    el.onclick=()=>{
      if(lock||el.classList.contains('done')||el===first) return;
      if(!first){ first=el; return; }
      lock=true;
      if(first.dataset.id===el.dataset.id){
        first.classList.add('done'); el.classList.add('done');
        award(); matched++;
        first=null; lock=false;
        if(matched===pairs.length) feedbackCorrect(()=>stageDone());
      } else {
        const a=first; a.style.borderColor='var(--bad)'; el.style.borderColor='var(--bad)';
        setTimeout(()=>{ a.style.borderColor=''; el.style.borderColor=''; first=null; lock=false; },700);
      }
    };
    grid.appendChild(el);
  });
}

/* ================= 2. SPEED SORTING ================= */
function stageSorting(){
  const items=shuffle([
    {w:'writer',g:0},{w:'editor',g:0},{w:'dancer',g:0},{w:'actor',g:0},
    {w:'librarian',g:1},{w:'journalist',g:1},{w:'musician',g:1},{w:'pianist',g:1}
  ]);
  let i=0;
  function show(){
    if(i>=items.length){ feedbackCorrect(()=>stageDone()); return; }
    const it=items[i];
    stageEl.innerHTML='<h2>Этап 2 · Сортировка суффиксов</h2>'+
      '<p class="prompt">К какой группе относится слово? Глагол + <b>-er/-or</b>, существительное + <b>-ian/-ist</b>.</p>'+
      '<div class="target">'+it.w+'</div>'+
      '<div class="grid two">'+
        '<button class="opt" data-g="0">-er / -or</button>'+
        '<button class="opt" data-g="1">-ian / -ist</button>'+
      '</div>';
    stageEl.querySelectorAll('.opt').forEach(b=>{
      b.onclick=()=>{
        stageEl.querySelectorAll('.opt').forEach(x=>x.style.pointerEvents='none');
        if(+b.dataset.g===it.g){ b.classList.add('good'); award(); i++; feedbackCorrect(show); }
        else { b.classList.add('bad'); const right=it.g===0?'-er / -or':'-ian / -ist'; i++; feedbackWrong(right, show); }
      };
    });
  }
  show();
}

/* ================= 3. MULTIPLE CHOICE (6) ================= */
function stageChoice(){
  const qs=[
    {base:'write',ans:'writer',pool:['writer','dancer','editor','teacher','singer','actor']},
    {base:'dance',ans:'dancer',pool:['dancer','writer','editor','teacher','singer','actor']},
    {base:'edit', ans:'editor',pool:['editor','writer','dancer','teacher','actor','singer']},
    {base:'teach',ans:'teacher',pool:['teacher','writer','dancer','editor','actor','singer']},
    {base:'library',ans:'librarian',pool:['librarian','musician','artist','journalist','scientist','pianist']},
    {base:'music',ans:'musician',pool:['musician','librarian','artist','journalist','scientist','pianist']},
    {base:'art',  ans:'artist',pool:['artist','librarian','musician','journalist','scientist','pianist']},
    {base:'science',ans:'scientist',pool:['scientist','librarian','musician','artist','journalist','pianist']}
  ];
  let i=0;
  function show(){
    if(i>=qs.length){ feedbackCorrect(()=>stageDone()); return; }
    const q=qs[i]; const opts=shuffle(q.pool);
    stageEl.innerHTML='<h2>Этап 3 · Сделай профессию</h2>'+
      '<p class="prompt">Какое слово получится? Выбери правильный вариант.</p>'+
      '<div class="target">'+q.base+' → ?</div>'+
      '<div class="grid two" id="opts"></div>';
    const g=document.getElementById('opts');
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{
        g.querySelectorAll('.opt').forEach(x=>x.style.pointerEvents='none');
        if(o===q.ans){ b.classList.add('good'); award(); i++; feedbackCorrect(show); }
        else { b.classList.add('bad'); i++; feedbackWrong(q.ans, show); }
      };
      g.appendChild(b);
    });
  }
  show();
}

/* ================= 4. TYPED INPUT ================= */
function stageTyped(){
  const qs=[
    {base:'teach',suf:'-er',ans:'teacher'},
    {base:'sing', suf:'-er',ans:'singer'},
    {base:'work', suf:'-er',ans:'worker'},
    {base:'act',  suf:'-or',ans:'actor'},
    {base:'edit', suf:'-or',ans:'editor'},
    {base:'journal',suf:'-ist',ans:'journalist'},
    {base:'art',  suf:'-ist',ans:'artist'},
    {base:'music',suf:'-ian',ans:'musician'}
  ];
  let i=0;
  function show(){
    if(i>=qs.length){ feedbackCorrect(()=>stageDone()); return; }
    const q=qs[i]; let tries=0;
    stageEl.innerHTML='<h2>Этап 4 · Напиши профессию</h2>'+
      '<p class="prompt">Добавь суффикс и напиши слово целиком.</p>'+
      '<div class="target">'+q.base+' + <span class="hint">'+q.suf+'</span></div>'+
      '<input class="inp" id="inp" placeholder="напиши здесь…" autocomplete="off" autocapitalize="off">'+
      '<div class="attempts" id="att">Попытки: 2</div>'+
      '<button class="btn" id="check">Проверить</button>';
    const inp=document.getElementById('inp');
    const att=document.getElementById('att');
    inp.focus();
    function submit(){
      const val=inp.value;
      if(!val.trim()) return;
      if(normWord(val)===normWord(q.ans)){
        award(); i++; feedbackCorrect(show);
      } else {
        tries++;
        if(tries>=2){ i++; feedbackWrong(q.ans, show); }
        else { att.textContent='Попытки: 1 — попробуй ещё раз'; att.style.color='var(--bad)'; inp.select(); }
      }
    }
    document.getElementById('check').onclick=submit;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  }
  show();
}

/* ================= 5. SENTENCE BUILDER ================= */
function stageSentence(){
  const qs=[
    {chips:['He','was','a','teacher'], ok:['he was a teacher']},
    {chips:['They','were','artists'], ok:['they were artists']},
    {chips:['She','was','a','singer','and','a','dancer'],
       ok:['she was a singer and a dancer','she was a dancer and a singer']},
    {chips:['We','were','musicians'], ok:['we were musicians']},
    {chips:['He','was','a','writer','and','an','editor'],
       ok:['he was a writer and an editor','he was an editor and a writer']}
  ];
  let i=0;
  function show(){
    if(i>=qs.length){ feedbackCorrect(()=>stageDone()); return; }
    const q=qs[i]; let tries=0; let placed=[];
    const order=shuffle(q.chips.map((w,k)=>({w,k})));
    stageEl.innerHTML='<h2>Этап 5 · Собери предложение</h2>'+
      '<p class="prompt">Нажимай на слова по порядку. Используй <b>was/were</b> правильно.</p>'+
      '<div class="build" id="build"></div>'+
      '<div id="pool" class="grid two" style="margin-bottom:10px;"></div>'+
      '<div class="attempts" id="att">Попытки: 2</div>'+
      '<div class="grid two">'+
        '<button class="btn ghost" id="reset">Сбросить</button>'+
        '<button class="btn" id="check">Проверить</button>'+
      '</div>';
    const build=document.getElementById('build');
    const pool=document.getElementById('pool');
    const att=document.getElementById('att');
    function redraw(){
      build.innerHTML = placed.length? placed.map(p=>'<span class="chip placed">'+p.w+'</span>').join('') : '<span style="color:#9a8d68;">…</span>';
    }
    order.forEach(o=>{
      const c=document.createElement('button'); c.className='chip'; c.textContent=o.w;
      c.onclick=()=>{ if(c.classList.contains('used'))return; c.classList.add('used'); placed.push({w:o.w,el:c}); redraw(); };
      pool.appendChild(c);
    });
    redraw();
    document.getElementById('reset').onclick=()=>{ placed.forEach(p=>p.el.classList.remove('used')); placed=[]; redraw(); };
    function submit(){
      if(!placed.length) return;
      const built=normSent(placed.map(p=>p.w).join(' '));
      if(q.ok.includes(built)){ award(); i++; feedbackCorrect(show); }
      else {
        tries++;
        if(tries>=2){ i++; feedbackWrong(capitalize(q.ok[0]), show); }
        else { att.textContent='Попытки: 1 — нажми «Сбросить» и попробуй снова'; att.style.color='var(--bad)'; }
      }
    }
    document.getElementById('check').onclick=submit;
  }
  show();
}
function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1)+'.'; }

/* ================= 6. BOSS ================= */
function stageBoss(){
  // mc: варианты was/were ; tf: верно/ошибка (грамматика)
  const qs=[
    {type:'tf', text:'We were scientists.', ok:true},
    {type:'tf', text:'He were an actor.',   ok:false, right:'He was an actor.'},
    {type:'mc', text:'I ___ a writer.',  opts:['was','were'], ans:'was'},
    {type:'mc', text:'You ___ a dancer.',opts:['was','were'], ans:'were'},
    {type:'tf', text:'She was a journalist.', ok:true},
    {type:'mc', text:'They ___ musicians.', opts:['was','were'], ans:'were'}
  ];
  let i=0; let hp=qs.length; const maxhp=qs.length;
  function frame(inner){
    stageEl.innerHTML='<div class="boss-stage"><h2>Финал · Хроностраж</h2>'+
      '<p class="prompt">Победи стража времени! Верный ответ — удар. Ошибка — он лечится.</p>'+
      bossSVG()+
      '<div class="hpbar"><div class="hpfill" id="hp"></div></div>'+
      '<div id="bq">'+inner+'</div></div>';
    document.getElementById('hp').style.width=(hp/maxhp*100)+'%';
  }
  function show(){
    if(i>=qs.length){ return bossEnd(); }
    const q=qs[i];
    let inner='<div class="target" style="font-size:21px;">'+q.text+'</div>';
    if(q.type==='mc') inner+='<div class="grid two" id="opts">'+q.opts.map(o=>'<button class="opt" data-o="'+o+'">'+o+'</button>').join('')+'</div>';
    else inner+='<div class="grid two" id="opts"><button class="opt" data-o="true">✓ Верно</button><button class="opt" data-o="false">✗ Ошибка</button></div>';
    frame(inner);
    stageEl.querySelectorAll('.opt').forEach(b=>{
      b.onclick=()=>{
        stageEl.querySelectorAll('.opt').forEach(x=>x.style.pointerEvents='none');
        const v=b.dataset.o;
        const right = q.type==='mc' ? (v===q.ans) : (v===String(q.ok));
        if(right){
          b.classList.add('good'); award(); hp=Math.max(0,hp-1);
          document.getElementById('hp').style.width=(hp/maxhp*100)+'%';
          i++; feedbackCorrect(show);
        } else {
          b.classList.add('bad'); hp=Math.min(maxhp,hp+1);
          document.getElementById('hp').style.width=(hp/maxhp*100)+'%';
          const ra = q.type==='mc' ? q.ans : (q.ok?'✓ Верно':'✗ Ошибка'+(q.right?' — '+q.right:''));
          i++; feedbackWrong(ra, show);
        }
      };
    });
  }
  function bossEnd(){
    const win = hp<=0;
    stageEl.innerHTML='<div class="boss-stage">'+
      (win?bossDefeatedSVG():bossSVG())+
      '<h2>'+(win?'Хроностраж побеждён! 🎉':'Страж устоял, но ты молодец!')+'</h2>'+
      '<p class="lead">Машина времени заряжена. Возвращаемся!</p>'+
      '<button class="btn brass" id="fin">Дальше</button></div>';
    document.getElementById('fin').onclick=finalScreen;
  }
  show();
}

/* ================= FINAL ================= */
function finalScreen(){
  hudEl.style.display='block';
  let stars=0;
  if(score>=350) stars=3; else if(score>=250) stars=2; else if(score>=150) stars=1;
  const starStr = '★★★'.slice(0,stars)+'☆☆☆'.slice(0,3-stars);
  stageEl.innerHTML='<div class="center">'+
    machineSVG()+
    '<h1>'+(stars>=2?'Путешествие удалось!':'Хорошая попытка!')+'</h1>'+
    '<div class="stars">'+starStr+'</div>'+
    '<div class="final-score">'+score+' / 410 ⭐</div>'+
    '<p class="lead" style="margin-top:10px;">'+
      (stars===3?'Идеально! Ты настоящий хронопутешественник.':
       stars===2?'Отличный результат — ещё чуть-чуть до максимума!':
       'Сыграй ещё раз и собери больше звёзд!')+'</p>'+
    '<button class="btn brass" id="again">Сыграть снова</button>'+
  '</div>';
  document.getElementById('again').onclick=()=>{ score=0; correct=0; setCharge(); renderScore(); hudEl.style.display='none'; intro(); };
}
